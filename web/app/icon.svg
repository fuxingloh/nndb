<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- page background, rounded like the site's cards -->
  <rect width="64" height="64" rx="14" fill="#0a0a0c"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="#27272f"/>

  <!-- search radius: the cell being scanned -->
  <circle cx="30" cy="32" r="18" fill="#818cf8" fill-opacity="0.08" stroke="#818cf8" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- query point at the centre -->
  <circle cx="30" cy="32" r="3.4" fill="#f4b860"/>

  <!-- k-nearest neighbours (selected) -->
  <circle cx="22" cy="26" r="2.6" fill="#818cf8"/>
  <circle cx="38" cy="25" r="2.6" fill="#818cf8"/>
  <circle cx="40" cy="38" r="2.6" fill="#818cf8"/>
  <circle cx="23" cy="40" r="2.6" fill="#818cf8"/>

  <!-- points outside the cell (dimmed, not returned) -->
  <circle cx="11" cy="14" r="2" fill="#7d7d88" fill-opacity="0.55"/>
  <circle cx="54" cy="16" r="2" fill="#7d7d88" fill-opacity="0.55"/>
  <circle cx="13" cy="53" r="2" fill="#7d7d88" fill-opacity="0.55"/>
  <circle cx="52" cy="52" r="2" fill="#7d7d88" fill-opacity="0.55"/>
</svg>
